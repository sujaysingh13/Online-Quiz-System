<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f4f6f9;
        }

        nav {
            background: #2563eb;
            color: white;
            padding: 18px 40px;
        }

        nav h1 {
            font-size: 28px;
        }

        .container {
            width: 90%;
            margin: 40px auto;
        }

        h2 {
            margin-bottom: 25px;
            color: #333;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .card {
            background: white;
            padding: 30px;
            text-align: center;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,.1);
        }

        .card h3 {
            color: #666;
            margin-bottom: 15px;
        }

        .card h1 {
            color: #2563eb;
            font-size: 40px;
        }

        @media(max-width:900px){

            .cards{
                grid-template-columns:repeat(2,1fr);
            }

        }

        @media(max-width:600px){

            .cards{
                grid-template-columns:1fr;
            }

        }

    </style>

</head>

<body>

    <nav>

        <h1>QuizMaster Admin Dashboard</h1>

    </nav>

    <div class="container">

        <h2>Overview</h2>

        <div class="cards">

            <div class="card">

                <h3>Total Students</h3>

                <h1>{{ total_students }}</h1>

            </div>

            <div class="card">

                <h3>Total Tests</h3>

                <h1>{{ total_tests }}</h1>

            </div>

            <div class="card">

                <h3>Total Questions</h3>

                <h1>{{ total_questions }}</h1>

            </div>

            <div class="card">

                <h3>Total Attempts</h3>

                <h1>{{ total_attempts }}</h1>

            </div>

        </div>

    </div>

</body>

</html>
