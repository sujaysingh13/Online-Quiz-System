<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - QuizMaster</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f4f6f9;
        }

        nav{
            background:#2563eb;
            color:white;
            padding:15px 40px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        nav h1{
            font-size:28px;
        }

        nav a{
            color:white;
            text-decoration:none;
            font-weight:bold;
            background:rgba(255,255,255,0.2);
            padding:8px 15px;
            border-radius:5px;
        }

        .container{
            width:90%;
            margin:40px auto;
        }

        .welcome{
            text-align:center;
            margin-bottom:40px;
        }

        .welcome h2{
            color:#333;
            margin-bottom:10px;
        }

        .welcome p{
            color:#666;
        }

        .quiz-grid{
            display:grid;
            grid-template-columns:repeat(auto-fit, minmax(250px, 1fr));
            gap:25px;
        }

        .quiz-card{
            background:white;
            padding:25px;
            border-radius:12px;
            box-shadow:0 4px 10px rgba(0,0,0,0.1);
            text-align:center;
        }

        .quiz-card h3{
            color:#2563eb;
            margin-bottom:10px;
        }

        .quiz-card p{
            color:#666;
            margin-bottom:20px;
        }

        .btn{
            display:inline-block;
            text-decoration:none;
            background:#2563eb;
            color:white;
            padding:10px 20px;
            border-radius:6px;
        }

        .btn:hover{
            background:#1d4ed8;
        }
    </style>
</head>
<body>

    <nav>
        <h1>QuizMaster</h1>
        <a href="#">Logout</a>
    </nav>

    <div class="container">

        <div class="welcome">
            <h2>Welcome to Your Dashboard</h2>
            <p>Select a quiz and test your knowledge.</p>
        </div>

        <div class="quiz-grid">

            <div class="quiz-card">
                <h3>General Knowledge</h3>
                <p>10 Questions</p>
                <a href="#" class="btn">Start Quiz</a>
            </div>

            <div class="quiz-card">
                <h3>Science</h3>
                <p>15 Questions</p>
                <a href="#" class="btn">Start Quiz</a>
            </div>

            <div class="quiz-card">
                <h3>Computer Science</h3>
                <p>20 Questions</p>
                <a href="#" class="btn">Start Quiz</a>
            </div>

            <div class="quiz-card">
                <h3>Mathematics</h3>
                <p>12 Questions</p>
                <a href="#" class="btn">Start Quiz</a>
            </div>

        </div>

    </div>

</body>
</html>
