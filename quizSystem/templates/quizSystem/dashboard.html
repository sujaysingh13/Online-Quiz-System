<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - QuizMaster</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f4f6f9;
        }

        nav{
            background:#2563eb;
            color:white;
            padding:15px 40px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        nav h1{
            font-size:28px;
        }

        nav a{
            color:white;
            text-decoration:none;
            font-weight:bold;
            background:rgba(255,255,255,0.2);
            padding:8px 15px;
            border-radius:5px;
        }

        nav a:hover{
            background:rgba(255,255,255,0.3);
        }

        .container{
            width:90%;
            margin:40px auto;
        }

        .welcome{
            text-align:center;
            margin-bottom:40px;
        }

        .welcome h2{
            color:#333;
            margin-bottom:10px;
        }

        .welcome p{
            color:#666;
        }

        .table-container{
            background:white;
            border-radius:12px;
            overflow:hidden;
            box-shadow:0 4px 10px rgba(0,0,0,0.1);
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        th{
            background:#2563eb;
            color:white;
            padding:15px;
            text-align:center;
        }

        td{
            padding:15px;
            text-align:center;
            border-bottom:1px solid #ddd;
        }

        tr:hover{
            background:#f8fafc;
        }

        .no-data{
            text-align:center;
            padding:25px;
            color:#777;
        }
    </style>
</head>
<body>

    <nav>
        <h1>QuizMaster</h1>
        <a href="{% url 'logout_user' %}">Logout</a>
    </nav>

    <div class="container">

        <div class="welcome">
            <h2>My Quiz History</h2>
            <p>Track all your quiz attempts and scores.</p>
        </div>

        <div class="table-container">

            <table>
                <thead>
                    <tr>
                        <th>Test No.</th>
                        <th>Subject Name</th>
                        <th>Date</th>
                        <th>Time</th>
                        <th>Score</th>
                    </tr>
                </thead>

                <tbody>

                    {% for test in tests %}
                    <tr>
                        <td>{{ test.test_no }}</td>
                        <td>{{ test.subject }}</td>
                        <td>{{ test.date }}</td>
                        <td>{{ test.time }}</td>
                        <td>{{ test.score }}/15</td>
                    </tr>
                    {% empty %}
                    <tr>
                        <td colspan="5" class="no-data">
                            No quiz attempts yet.
                        </td>
                    </tr>
                    {% endfor %}

                </tbody>
            </table>

        </div>

    </div>

</body>
</html>
