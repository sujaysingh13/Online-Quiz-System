{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Change Password</title>

    <link rel="stylesheet"
          href="{% static 'quizSystem/css/change_password.css' %}">

</head>

<body>

<div class="container">

    <h2>Change Password</h2>

    {% if messages %}

        {% for message in messages %}

            <div class="{{ message.tags }}">

                {{ message }}

            </div>

        {% endfor %}

    {% endif %}

    <form method="POST">

        {% csrf_token %}

        <div class="input-group">

            <label>Current Password</label>

            <input
                type="password"
                name="current_password"
                required>

        </div>

        <div class="input-group">

            <label>New Password</label>

            <input
                type="password"
                name="new_password"
                required>

        </div>

        <div class="input-group">

            <label>Confirm New Password</label>

            <input
                type="password"
                name="confirm_password"
                required>

        </div>

        <button type="submit">

            Change Password

        </button>

    </form>

    <div class="back-link">

        <a href="{% url 'profile' %}">

            ← Back to Profile

        </a>

    </div>

</div>

</body>
</html>
