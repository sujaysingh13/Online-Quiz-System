{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>My Profile</title>

    <link rel="stylesheet"
          href="{% static 'quizSystem/css/profile.css' %}">

</head>

<body>

<div class="container">

    <h2>My Profile</h2>

    {% if messages %}

        {% for message in messages %}

            <div class="{{ message.tags }}">

                {{ message }}

            </div>

        {% endfor %}

    {% endif %}

    <form method="POST">

        {% csrf_token %}

        <div class="input-group">

            <label>Full Name</label>

            <input
                type="text"
                name="fullname"
                value="{{ request.user.first_name }}"
                required>

        </div>

        <div class="input-group">

            <label>Username</label>

            <input
                type="text"
                name="username"
                value="{{ request.user.username }}"
                required>

        </div>

        <div class="input-group">

            <label>Email</label>

            <input
                type="email"
                name="email"
                value="{{ request.user.email }}"
                required>

        </div>

        <button type="submit">

            Save Changes

        </button>

        <div class="back-link">
            <a href="{% url 'quizSystem_index' %}">
                ← Back to Home
            </a>
        </div>

    </form>

</div>

</body>
</html>
